<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐭 Cheese Thief — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --cheese: #FFD700;
    --cheese-dark: #E6A800;
    --bg: #1a0a00;
    --card: #2d1505;
    --card2: #3d1f08;
    --text: #FFF8E7;
    --accent: #FF6B35;
    --red: #e74c3c;
    --muted: #a07850;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 32px;
    overflow: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(139,69,19,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(255,215,0,0.08) 0%, transparent 60%);
  }

  /* Particles */
  .particle-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute; width: 4px; height: 4px; border-radius: 50%;
    background: var(--cheese); opacity: 0;
    animation: twinkle var(--d, 4s) var(--delay, 0s) infinite;
  }
  @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.5);} 50%{opacity:0.6;transform:scale(1.2);} }

  /* Stickers */
  .sticker {
    position: fixed; pointer-events: none; z-index: 1; opacity: 0.12;
    font-size: 5rem;
    animation: drift var(--drift-d, 20s) var(--drift-delay, 0s) ease-in-out infinite;
  }
  @keyframes drift {
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-30px) rotate(10deg);}
  }

  /* Hero */
  .login-hero { text-align: center; position: relative; z-index: 5; }
  .big-rat {
    font-size: 7rem; display: block;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.3));
  }
  @keyframes float {
    0%,100%{transform:translateY(0) rotate(-5deg);}
    50%{transform:translateY(-14px) rotate(5deg);}
  }
  .login-hero h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 3.2rem; color: var(--cheese);
    text-shadow: 0 0 30px rgba(255,215,0,0.4);
    line-height: 1; margin-top: 4px;
  }
  .login-hero p { color: var(--muted); margin-top: 8px; font-size: 1rem; }

  /* Card */
  .login-card {
    background: var(--card);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 20px;
    padding: 32px;
    width: 340px;
    box-shadow: var(--shadow), 0 0 60px rgba(255,215,0,0.05);
    position: relative; z-index: 5;
    animation: card-in 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes card-in { from{opacity:0;transform:translateY(20px) scale(0.95);} to{opacity:1;transform:none;} }

  .login-card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem; color: var(--cheese);
    margin-bottom: 20px; text-align: center;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 0.8rem; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px;
  }
  .field input {
    width: 100%; background: var(--card2);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 10px; padding: 10px 14px;
    color: var(--text); font-family: 'Nunito', sans-serif;
    font-size: 1rem; outline: none; transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--cheese); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--cheese), var(--cheese-dark));
    color: var(--bg); border: none; border-radius: 12px;
    padding: 12px; font-family: 'Fredoka One', cursive;
    font-size: 1.1rem; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(255,215,0,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,215,0,0.4); }
  .btn-primary:active { transform: translateY(0); }

  .error-msg {
    color: var(--red); font-size: 0.85rem; text-align: center;
    margin-top: 8px; min-height: 20px; font-weight: 700;
  }

  /* Cheese bg decoration */
  .cheese-bg {
    position: fixed; bottom: -60px; right: -60px;
    width: 320px; height: 320px; opacity: 0.04;
    pointer-events: none; z-index: 0;
    border-radius: 50%; background-color: #FFD700;
    background:
      radial-gradient(circle 20px at 30% 40%, transparent 18px, #FFD700 18px, #FFD700 22px, transparent 22px),
      radial-gradient(circle 14px at 65% 25%, transparent 12px, #FFD700 12px, #FFD700 16px, transparent 16px),
      radial-gradient(circle 18px at 75% 70%, transparent 16px, #FFD700 16px, #FFD700 20px, transparent 20px),
      #FFD700;
  }
</style>
</head>
<body>

<div class="particle-layer" id="particles"></div>
<div class="cheese-bg"></div>
<div class="sticker" style="top:10%;left:4%;--drift-d:18s;--drift-delay:0s;">🐭</div>
<div class="sticker" style="top:55%;left:90%;--drift-d:22s;--drift-delay:3s;">🧀</div>
<div class="sticker" style="top:78%;left:6%;--drift-d:25s;--drift-delay:6s;">🐭</div>
<div class="sticker" style="top:25%;left:86%;--drift-d:20s;--drift-delay:1.5s;">🧀</div>

<div class="login-hero">
  <span class="big-rat">🐭</span>
  <h1>Cheese Thief</h1>
  <p>Game Master System</p>
</div>

<div class="login-card">
  <h2>🔐 เข้าสู่ระบบ</h2>
  <div class="field">
    <label>Username</label>
    <input type="text" id="inp-user" placeholder="username" autocomplete="off" autofocus>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="inp-pass" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn-primary" onclick="doLogin()">🐭 เข้าเล่น!</button>
  <div class="error-msg" id="login-error"></div>
</div>

<script>
  // Particles
  (function() {
    const layer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*5}s;--delay:${Math.random()*4}s;`;
      layer.appendChild(s);
    }
  })();

  const USERS = {
    admin: { password: '1234', role: 'admin' },
    user:  { password: '1234', role: 'user' }
  };

  // Redirect if already logged in
  if (sessionStorage.getItem('ct_user')) {
    window.location.href = 'index.html';
  }

  function doLogin() {
    const u = document.getElementById('inp-user').value.trim();
    const p = document.getElementById('inp-pass').value;
    const err = document.getElementById('login-error');
    if (USERS[u] && USERS[u].password === p) {
      sessionStorage.setItem('ct_user', JSON.stringify({ username: u, role: USERS[u].role }));
      // Fade out and redirect
      document.body.style.transition = 'opacity 0.3s';
      document.body.style.opacity = '0';
      setTimeout(() => { window.location.href = 'index.html'; }, 300);
    } else {
      err.textContent = '❌ Username หรือ Password ไม่ถูกต้อง';
      document.getElementById('inp-pass').value = '';
      document.getElementById('inp-pass').focus();
      // Shake card
      const card = document.querySelector('.login-card');
      card.style.animation = 'none';
      card.style.transform = 'translateX(-8px)';
      setTimeout(() => card.style.transform = 'translateX(8px)', 80);
      setTimeout(() => card.style.transform = 'translateX(-5px)', 160);
      setTimeout(() => card.style.transform = 'translateX(5px)', 240);
      setTimeout(() => card.style.transform = '', 320);
    }
  }
</script>
</body>
</html>
